name: 주가 알림

on:
  schedule:
    # KST 08:00 (월~금) = UTC 23:00 (일~목)
    - cron: "0 23 * * 0-4"
    # KST 09:00~20:00 (월~금) = UTC 00:00~11:00 (월~금)
    - cron: "0 0-11 * * 1-5"
  workflow_dispatch: {}  # 수동 실행 버튼도 사용 가능

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests

      - name: 스크립트 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_stock_alert.py
